<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Your Account - SpendSmart</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-main);
    }

    .onboarding-container {
      width: 100%;
      max-width: 500px;
      padding: 40px;
    }

    .header-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-section i {
      font-size: 2.5rem;
      color: var(--accent-primary);
      margin-bottom: 16px;
    }

    .header-section h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header-section p {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border-color);
      border-radius: 4px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-primary);
      width: 50%;
      transition: width 0.3s ease;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.4s ease forwards;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
    }

  </style>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>

  <div class="card onboarding-container">
    <div class="header-section">
      <div style="display: flex; justify-content: center; margin-bottom: 16px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 16c-3.3 0-5-2.2-5-4s1.7-4 5-4 4 2 6 4-2.7 4-6 4zm10-8c3.3 0 5 2.2 5 4s-1.7 4-5 4-4-2-6-4 2.7-4 6-4z"/>
        </svg>
      </div>
      <h2>Welcome to SpendSmart</h2>
      <p>Let's personalize your financial dashboard.</p>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-bar"></div>
    </div>

    <form id="onboarding-form">
      
      <!-- Step 1: Personal Info -->
      <div class="step active" id="step-1">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="ob-name" class="form-control" placeholder="Jane Doe" required>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="ob-age" class="form-control" placeholder="25" min="13" max="120" required>
        </div>
        <div class="form-group">
          <label>Country</label>
          <select id="ob-country" class="form-control" required>
            <option value="US">United States</option>
            <option value="UK">United Kingdom</option>
            <option value="CA">Canada</option>
            <option value="IN">India</option>
            <option value="EU">European Union</option>
            <option value="OTHER">Other</option>
          </select>
        </div>
        
        <div class="nav-buttons" style="justify-content: flex-end;">
          <button type="button" class="btn btn-primary" onclick="nextStep(2)">Continue <i class="fa-solid fa-arrow-right"></i></button>
        </div>
      </div>

      <!-- Step 2: Financial Info -->
      <div class="step" id="step-2">
        <div class="form-group">
          <label>Preferred Currency</label>
          <select id="ob-currency" class="form-control" required>
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="GBP">GBP (£)</option>
            <option value="INR">INR (₹)</option>
            <option value="JPY">JPY (¥)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Monthly Income (Estimated)</label>
          <input type="number" id="ob-income" class="form-control" placeholder="5000" min="0" required>
        </div>
        <div class="form-group">
          <label>Monthly Budget Goal</label>
          <input type="number" id="ob-budget" class="form-control" placeholder="3000" min="0" required>
        </div>
        
        <div class="nav-buttons">
          <button type="button" class="btn btn-secondary" onclick="nextStep(1)">Back</button>
          <button type="submit" class="btn btn-primary">Complete Setup <i class="fa-solid fa-check"></i></button>
        </div>
      </div>

    </form>
  </div>

  <script src="js/firebase.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/onboarding.js"></script>
</body>
</html>
