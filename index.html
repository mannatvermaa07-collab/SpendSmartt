<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendSmart - Professional Finance Management</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Minimal Landing Page Styles */
    header {
      padding: 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }
    .logo i {
      color: var(--accent-primary);
      margin-right: 8px;
    }
    
    .hero {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 0;
    }
    
    .hero-badge {
      display: inline-block;
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -1.5px;
      max-width: 800px;
    }
    
    .hero p.tagline {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 600px;
      line-height: 1.6;
    }
    
    .cta-group {
      display: flex;
      gap: 16px;
      margin-bottom: 60px;
    }

    .cta-group .btn {
      padding: 12px 24px;
      font-size: 1rem;
    }
    
    .dashboard-preview {
      width: 100%;
      max-width: 1000px;
      height: 500px;
      position: relative;
      margin: 0 auto;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=1000');
      background-position: center top;
      background-size: cover;
      opacity: 0.8;
    }

    .dashboard-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, var(--bg-main) 0%, transparent 100%);
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 2.5rem; }
      .cta-group { flex-direction: column; width: 100%; max-width: 300px; margin: 0 auto 40px;}
      .dashboard-preview { height: 300px; }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>

  <div class="container">
    <header>
      <div class="logo" style="display: flex; align-items: center; gap: 8px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 16c-3.3 0-5-2.2-5-4s1.7-4 5-4 4 2 6 4-2.7 4-6 4zm10-8c3.3 0 5 2.2 5 4s-1.7 4-5 4-4-2-6-4 2.7-4 6-4z"/>
        </svg> SpendSmart
      </div>
      <nav>
      </nav>
    </header>

    <main class="hero">
      <div class="hero-badge animate-slide-up">
        Announcing SpendSmart 2.0 <i class="fa-solid fa-arrow-right" style="margin-left: 4px;"></i>
      </div>
      
      <h1 class="animate-slide-up" style="animation-delay: 0.1s">
        The financial operating system for your personal wealth.
      </h1>
      
      <p class="tagline animate-slide-up" style="animation-delay: 0.2s">
        SpendSmart gives you the analytics, tools, and professional insights you need to take complete control of your financial future.
      </p>
      
      <div class="cta-group animate-slide-up" style="animation-delay: 0.3s; margin-bottom: 24px;">
        <a href="login.html?view=signup" class="btn btn-primary" style="font-size: 1.1rem; padding: 14px 32px; background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-purple) 100%); border: none; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s; display: flex; align-items: center; gap: 8px;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 12px 25px rgba(99, 102, 241, 0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 20px rgba(99, 102, 241, 0.3)'">
          Get Started <i class="fa-solid fa-arrow-right"></i>
        </a>
        <a href="login.html?view=login" class="btn btn-secondary" style="font-size: 1.1rem; padding: 14px 32px; transition: transform 0.3s; display:flex; align-items:center; gap:8px;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
        </a>
      </div>
      
      <div class="animate-slide-up" style="animation-delay: 0.4s; margin-bottom: 60px;">
        <a href="#" onclick="startDemoMode(event)" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='var(--text-main)'" onmouseout="this.style.color='var(--text-muted)'">
          <i class="fa-solid fa-play" style="margin-right: 6px; font-size: 0.8rem;"></i> Explore Platform (Demo Mode)
        </a>
      </div>
      
      <div id="preview" class="dashboard-preview animate-fade-in" style="animation-delay: 0.5s">
        <div class="dashboard-overlay"></div>
      </div>
    </main>
  </div>

  <script src="js/firebase.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script>
    function startDemoMode(e) {
      e.preventDefault();
      localStorage.setItem('spendSmart_currentAccount', 'demo');
      window.Store.init();
      if(window.Store.getExpenses().length === 0) {
        window.Store.addExpense({amount: 150.50, category: 'food', date: new Date().toISOString(), description: 'Whole Foods Market'});
        window.Store.addExpense({amount: 35.00, category: 'transport', date: new Date().toISOString(), description: 'Uber Ride'});
        window.Store.addExpense({amount: 89.99, category: 'shopping', date: new Date(Date.now() - 86400000).toISOString(), description: 'Amazon Purchases'});
        window.Store.addExpense({amount: 120.00, category: 'bills', date: new Date(Date.now() - 86400000*2).toISOString(), description: 'Electric Bill'});
        window.Store.setBudget(2500);
        window.Store.addReminder({ title: 'Netflix Subscription', amount: 15.99, frequency: 'monthly', startDate: new Date(Date.now() + 86400000*5).toISOString() });
      }
      window.location.href = 'dashboard.html';
    }

    function openLoginModal(e) {
      e.preventDefault();
      window.location.href = 'login.html';
    }
  </script>
  <style>
    @keyframes fadein { to { opacity: 1; } }
    @keyframes slideup { to { transform: translateY(0); } }
  </style>
</body>
</html>
